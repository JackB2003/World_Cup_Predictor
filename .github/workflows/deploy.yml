name: Deploy to VPS

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to production
    runs-on: self-hosted

    steps:
      - name: Deploy
        run: |
          set -euo pipefail
          cd /var/www/world-cup-predictor
          git fetch origin main
          git reset --hard origin/main
          bash scripts/deploy.sh
